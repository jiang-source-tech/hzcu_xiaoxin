<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关系闭环测试 v2 · 小芯</title>
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface-soft: #f0f5f2;
    --ink: #17202a;
    --muted: #64707d;
    --line: #d8dee6;
    --green: #16815d;
    --green-soft: #e8f6ef;
    --red: #c8333a;
    --red-soft: #fff0f1;
    --gold: #a66d09;
    --gold-soft: #fff6df;
    --teal: #217783;
    --blue: #2b5f99;
    --blue-soft: #eef4fb;
    --radius: 8px;
    --radius-lg: 16px;
    --shadow: 0 2px 12px rgba(13,27,42,0.08);
    --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(22,129,93,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(33,119,131,0.03) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .shell {
    position: relative; z-index: 1;
    width: min(900px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* Header */
  .top {
    margin-bottom: 20px;
  }
  .top h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .top .sub {
    font-size: 0.875rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .top .nav {
    margin-top: 8px;
    font-size: 0.8rem;
  }
  .top .nav a {
    color: var(--teal);
    text-decoration: none;
  }
  .top .nav a:hover { text-decoration: underline; }

  /* Toolbar */
  .toolbar {
    display: grid;
    grid-template-columns: minmax(180px, 1.4fr) 100px minmax(100px, 0.6fr) auto auto;
    gap: 10px;
    align-items: end;
    margin-bottom: 20px;
    background: var(--surface);
    padding: 16px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
  }
  .toolbar label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .toolbar select, .toolbar input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-family: var(--font);
    background: var(--surface);
    color: var(--ink);
  }
  .toolbar select:focus, .toolbar input:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-soft);
  }
  .toolbar .checkbox-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-top: 20px;
  }
  .toolbar .checkbox-row label {
    margin: 0;
    font-size: 0.8rem;
    text-transform: none;
    letter-spacing: 0;
  }
  .btn {
    padding: 9px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #126b4a; }
  .btn-secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--line); }
  .btn-secondary:hover:not(:disabled) { background: var(--bg); }

  /* Status */
  .status-line {
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 0.85rem;
    margin-bottom: 16px;
    background: var(--surface-soft);
    color: var(--muted);
    transition: all 0.3s;
  }
  .status-line.running {
    background: var(--blue-soft);
    color: var(--blue);
    font-weight: 500;
  }
  .status-line.error {
    background: var(--red-soft);
    color: var(--red);
    font-weight: 500;
  }
  .status-line.done {
    background: var(--green-soft);
    color: var(--green);
    font-weight: 500;
  }

  /* Results area */
  .results { margin-top: 16px; }
  .empty-hint {
    text-align: center;
    padding: 48px 16px;
    border: 2px dashed var(--line);
    border-radius: var(--radius-lg);
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* Scene card */
  .scene-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .scene-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--line);
    transition: background 0.15s;
  }
  .scene-head:hover { background: var(--surface-soft); }
  .scene-head-left { display: flex; align-items: center; gap: 10px; }
  .scene-head-title { font-weight: 600; }
  .scene-head-desc { font-size: 0.8rem; color: var(--muted); }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .badge.pass { background: var(--green-soft); color: var(--green); }
  .badge.warn { background: var(--gold-soft); color: var(--gold); }
  .badge.fail { background: var(--red-soft); color: var(--red); }
  .badge.running { background: var(--blue-soft); color: var(--blue); }

  .scene-body { padding: 16px 20px; }
  .scene-body.hidden { display: none; }

  /* Quality panel */
  .quality-panel {
    background: var(--surface-soft);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .quality-panel h4 {
    font-size: 0.85rem;
    margin-bottom: 10px;
    color: var(--teal);
  }
  .score-bars { display: flex; flex-direction: column; gap: 6px; }
  .score-row {
    display: grid;
    grid-template-columns: 90px 1fr 30px;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
  }
  .score-row .dim { color: var(--muted); }
  .score-row .bar-bg {
    height: 8px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .score-row .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
  }
  .bar-fill.high { background: var(--green); }
  .bar-fill.mid { background: var(--gold); }
  .bar-fill.low { background: var(--red); }
  .score-row .val { font-weight: 700; text-align: right; }
  .overall-comment {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    font-size: 0.85rem;
    color: var(--ink);
    font-style: italic;
  }

  /* Daily LLM replay */
  .replay-intro {
    margin-bottom: 14px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.6;
  }
  .episode-record {
    padding: 14px 0 16px;
    border-top: 1px solid var(--line);
    animation: fadeIn 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  .episode-record:first-child { border-top: none; }
  .day-section {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin: 14px 0;
    overflow: hidden;
    background: var(--surface);
  }
  .day-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface-soft);
    cursor: pointer;
  }
  .day-title { font-weight: 700; }
  .day-summary {
    padding: 8px 12px;
    font-size: 0.82rem;
    color: var(--muted);
    border-top: 1px solid var(--line);
    white-space: pre-wrap;
  }
  .day-body.hidden { display: none; }
  .idle-gap {
    padding: 12px 0;
  }
  .idle-gap-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--muted);
    font-size: 0.82rem;
  }
  .idle-gap-title {
    color: var(--ink);
    font-weight: 700;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .ep-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ep-day {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ink);
  }
  .ep-kind {
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--blue-soft);
    color: var(--blue);
    font-size: 0.68rem;
    font-weight: 700;
  }
  .ep-chat {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    max-width: 92%;
  }
  .msg-row.user-msg { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .msg-avatar.student { background: #e8f0fe; color: var(--blue); }
  .msg-avatar.xiaoxin { background: var(--green-soft); color: var(--green); }
  .msg-content { min-width: 0; }
  .msg-bubble {
    background: var(--surface-soft);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-size: 0.92rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-row.user-msg .msg-bubble { background: #e8f0fe; }
  .msg-row .msg-label {
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 2px;
    font-weight: 600;
  }

  /* State strip */
  .state-strip {
    margin-top: 10px;
    padding: 8px 10px;
    border-radius: var(--radius);
    background: var(--bg);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .chip.active { background: var(--green-soft); color: var(--green); border-color: var(--green); }
  .chip.warn { background: var(--gold-soft); color: var(--gold); border-color: var(--gold); }

  /* Manual review */
  .manual-review {
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--surface);
  }
  .manual-review-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .review-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .review-item {
    min-width: 0;
    padding: 8px;
    border-radius: 4px;
    background: var(--bg);
    font-size: 0.78rem;
    line-height: 1.5;
  }
  .review-label {
    display: block;
    margin-bottom: 3px;
    color: var(--muted);
    font-weight: 600;
  }
  .review-value {
    color: var(--ink);
    word-break: break-word;
    white-space: pre-wrap;
  }
  .review-checks {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.78rem;
  }
  .review-checks label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  /* Memory audit */
  .memory-audit {
    margin-top: 10px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--surface);
    overflow: hidden;
  }
  .memory-audit summary {
    cursor: pointer;
    padding: 10px 12px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--teal);
    background: var(--bg);
  }
  .memory-audit-body {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .memory-audit-flags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .audit-flag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--muted);
  }
  .audit-flag.pass { background: var(--green-soft); color: var(--green); border-color: var(--green); }
  .audit-flag.warn { background: var(--gold-soft); color: var(--gold); border-color: var(--gold); }
  .audit-flag.fail { background: var(--red-soft); color: var(--red); border-color: var(--red); }
  .memory-audit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .memory-audit-block {
    padding: 8px;
    border-radius: 4px;
    background: var(--bg);
    font-size: 0.78rem;
    line-height: 1.5;
    min-width: 0;
  }
  .memory-audit-title {
    display: block;
    margin-bottom: 4px;
    color: var(--muted);
    font-weight: 700;
  }
  .memory-audit-line {
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Violations */
  .violation-item {
    margin-top: 8px;
    padding: 8px 10px;
    border-left: 3px solid var(--red);
    background: var(--red-soft);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 0.82rem;
    color: var(--red);
    line-height: 1.5;
  }
  .violation-type {
    font-weight: 700;
    margin-right: 4px;
  }

  /* Notes */
  .scene-notes {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--surface-soft);
    border-radius: var(--radius);
    font-size: 0.82rem;
    color: var(--muted);
    white-space: pre-line;
    line-height: 1.6;
  }

  @media (max-width: 700px) {
    .toolbar {
      grid-template-columns: 1fr 1fr;
    }
    .msg-row { max-width: 100%; }
    .review-grid { grid-template-columns: 1fr; }
    .scene-head-left { align-items: flex-start; flex-direction: column; gap: 6px; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <h1>每日 LLM 对话回放</h1>
    <div class="sub">用户模拟 LLM → 小芯真实管线 → 质量裁判 LLM，按天回放每轮对话和状态变化。</div>
    <div class="nav">
      <a href="/test">对话压测</a> ·
      <a href="/">主页</a>
    </div>
  </div>

  <div class="toolbar">
    <div>
      <label for="sceneSelect">场景</label>
      <select id="sceneSelect">
        <option value="all">全部场景</option>
      </select>
    </div>
    <div>
      <label for="modeSelect">模式</label>
      <select id="modeSelect">
        <option value="mixed" selected>混合压力</option>
        <option value="regression">固定回归</option>
        <option value="pressure">自由压力</option>
      </select>
    </div>
    <div>
      <label for="turnsPerDaySelect">每天轮数</label>
      <select id="turnsPerDaySelect">
        <option value="3">3</option>
        <option value="8">8</option>
        <option value="12" selected>12</option>
        <option value="16">16</option>
      </select>
    </div>
    <div>
      <label for="maxDaysInput">最大天数（可选）</label>
      <input type="number" id="maxDaysInput" placeholder="不限" min="1">
    </div>
    <div>
      <label for="seedInput">Seed（可选）</label>
      <input type="number" id="seedInput" placeholder="随机">
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="skipJudge">
      <label for="skipJudge">跳过质量裁判</label>
    </div>
    <button class="btn btn-primary" id="runButton" onclick="startRun()">开始测试</button>
    <button class="btn btn-secondary" id="clearButton" onclick="clearResults()">清空</button>
  </div>

  <div class="status-line" id="statusLine">选择场景后点击开始。</div>
  <div class="results" id="results">
    <div class="empty-hint">选择场景后开始运行，页面会按天展示用户 LLM 和小芯 LLM 的完整对话。</div>
  </div>
</div>

<script>
  const API_BASE = '';

  async function loadScenes() {
    try {
      const resp = await fetch(`${API_BASE}/api/v2/relationship-selfplay/scenes`);
      const data = await resp.json();
      const sel = document.getElementById('sceneSelect');
      sel.innerHTML = '<option value="all">全部场景</option>';
      data.scenes.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.scene_id;
        opt.textContent = s.name;
        sel.appendChild(opt);
      });
    } catch (e) {
      console.error('Failed to load scenes:', e);
    }
  }

  function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  function renderQualityPanel(qj) {
    if (!qj || !qj.scores) return '';
    const scores = qj.scores;
    let bars = '';
    for (const [dim, val] of Object.entries(scores)) {
      const pct = val != null ? (val / 5 * 100) : 0;
      const cls = val >= 4 ? 'high' : val >= 3 ? 'mid' : 'low';
      bars += `
        <div class="score-row">
          <span class="dim">${escapeHtml(dim)}</span>
          <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
          <span class="val">${val != null ? val : '?'}</span>
        </div>`;
    }
    return `
      <div class="quality-panel">
        <h4>质量裁判评分</h4>
        <div class="score-bars">${bars}</div>
        ${qj.overall_comment ? `<div class="overall-comment">${escapeHtml(qj.overall_comment)}</div>` : ''}
      </div>`;
  }

  function formatCompanionAction(action) {
    if (!action || typeof action !== 'object') return 'none';
    const kind = action.kind || 'unknown';
    const intensity = action.intensity != null ? ` ${action.intensity}` : '';
    return `${kind}${intensity}`;
  }

  function formatViolationDetail(v) {
    const detail = String(v.detail || '');
    const stageMatch = detail.match(/期望 user_stage=([^，。]+)，实际=([^，。]+)。?/);
    if (stageMatch) {
      return `期望阶段 ${stageMatch[1]}，实际阶段 ${stageMatch[2]}`;
    }
    const topicMatch = detail.match(/期望 recent_topic=([^，。]+)，实际=([^，。]+)。?/);
    if (topicMatch) {
      return `期望主题 ${topicMatch[1]}，实际主题 ${topicMatch[2]}`;
    }
    const hookMatch = detail.match(/期望 next_hook\.topic=([^，。]+)，实际=([^，。]+)。?/);
    if (hookMatch) {
      return `期望 hook 主题 ${hookMatch[1]}，实际 hook 主题 ${hookMatch[2]}`;
    }
    if (detail) return detail;
    return v.evidence || '';
  }

  function renderViolation(v) {
    const detail = formatViolationDetail(v);
    return `
      <div class="violation-item">
        <span class="violation-type">⚠ ${escapeHtml(v.type || '规则提醒')}</span>
        ${escapeHtml(detail)}
      </div>`;
  }

  function formatReviewValue(value) {
    if (value == null || value === '') return '无';
    if (Array.isArray(value)) return value.length ? value.join('\n') : '无';
    if (typeof value === 'object') return Object.entries(value)
      .map(([k, v]) => `${k}: ${typeof v === 'object' ? JSON.stringify(v) : v}`)
      .join('\n') || '无';
    return String(value);
  }

  function renderManualReviewPanel(r) {
    const review = r.review_context || {};
    const probes = review.probes || {};
    const forbid = review.forbid_patterns || [];
    const intent = review.intent || (r.action === 'greeting' ? '打开页面后触发每日问候' : '无');
    return `
      <div class="manual-review">
        <div class="manual-review-title">人工审核</div>
        <div class="review-grid">
          <div class="review-item">
            <span class="review-label">场景意图</span>
            <div class="review-value">${escapeHtml(formatReviewValue(intent))}</div>
          </div>
          <div class="review-item">
            <span class="review-label">状态探针</span>
            <div class="review-value">${escapeHtml(formatReviewValue(probes))}</div>
          </div>
          <div class="review-item">
            <span class="review-label">禁用模式</span>
            <div class="review-value">${escapeHtml(formatReviewValue(forbid))}</div>
          </div>
          <div class="review-item">
            <span class="review-label">本轮核对</span>
            <div class="review-value">用户 LLM → 小芯 LLM → 状态条</div>
          </div>
        </div>
        <div class="review-checks">
          <label><input type="checkbox">用户语义保真</label>
          <label><input type="checkbox">回应未跑偏</label>
          <label><input type="checkbox">状态可信</label>
        </div>
      </div>`;
  }

  function formatAuditValue(value) {
    if (value == null || value === '') return '空';
    if (typeof value === 'object') return JSON.stringify(value);
    return String(value);
  }

  function renderAuditLines(items, emptyText) {
    if (!items || !items.length) {
      return `<div class="memory-audit-line">${escapeHtml(emptyText)}</div>`;
    }
    return items.map(item => `<div class="memory-audit-line">${escapeHtml(item)}</div>`).join('');
  }

  function renderMemoryAuditPanel(r) {
    const audit = r.memory_audit;
    if (!audit) return '';

    const after = audit.relationship_after || {};
    const hook = after.next_hook || {};
    const flags = audit.audit_flags || [];
    const relationshipChanges = audit.relationship_changes || [];
    const memoryEvents = audit.memory_events || [];
    const longTerm = audit.long_term_memories || [];

    const flagHtml = flags.length
      ? flags.map(f => `<span class="audit-flag ${escapeHtml(f.severity || 'info')}">${escapeHtml(f.label || f.type || '记忆提示')}</span>`).join('')
      : '<span class="audit-flag">本轮无明显记忆变化</span>';

    const relationshipSummary = [
      `core_concern: ${after.core_concern || '空'}`,
      `growth_intent: ${after.growth_intent || '空'}`,
      `next_hook: ${hook.topic || 'none'} / ${hook.active ? 'active' : 'inactive'}`,
    ];

    const changeLines = relationshipChanges.map(c =>
      `${c.field}: ${formatAuditValue(c.before)} -> ${formatAuditValue(c.after)}`
    );
    const eventLines = memoryEvents.map(e => {
      const m = e.memory || {};
      return `${e.action}: [${m.type || 'misc'}] ${m.content || ''}`;
    });
    const memoryLines = longTerm.map(m =>
      `[${m.type || 'misc'}] ${m.content || ''} (${m.status || 'unknown'} / ${m.strength ?? '?'})`
    );

    return `
      <details class="memory-audit" open>
        <summary>记忆审计</summary>
        <div class="memory-audit-body">
          <div class="memory-audit-flags">${flagHtml}</div>
          <div class="memory-audit-grid">
            <div class="memory-audit-block">
              <span class="memory-audit-title">关系状态记忆</span>
              ${renderAuditLines(relationshipSummary, '无关系状态')}
            </div>
            <div class="memory-audit-block">
              <span class="memory-audit-title">关系变化 relationship_changes</span>
              ${renderAuditLines(changeLines, '本轮未改变关系状态')}
            </div>
            <div class="memory-audit-block">
              <span class="memory-audit-title">长期记忆事件</span>
              ${renderAuditLines(eventLines, '长期记忆未新增或更新')}
            </div>
            <div class="memory-audit-block">
              <span class="memory-audit-title">当前长期记忆 long_term_memories</span>
              ${renderAuditLines(memoryLines, '当前没有长期记忆')}
            </div>
          </div>
        </div>
      </details>`;
  }

  function formatTurnLabel(r) {
    const turnIndex = r.turn_index || 1;
    const turnCount = r.turn_count || 1;
    return turnCount > 1 ? `Turn ${turnIndex}/${turnCount}` : `Turn ${turnIndex}`;
  }

  function renderIdleGap(r) {
    return `
      <div class="episode-record idle-gap">
        <div class="idle-gap-box">
          <span class="idle-gap-title">${escapeHtml(r.label || `Day ${r.day}`)}</span>
          <span>无交互空窗：用户没有打开页面或发起对话，共 ${escapeHtml(String(r.gap_days || 1))} 天。</span>
        </div>
      </div>`;
  }

  function shouldShowManualReview(r) {
    const turn_index = r.turn_index || 1;
    const turn_count = r.turn_count || 1;
    return r.action === 'chat' && turn_index === turn_count;
  }

  function formatTurnSource(source) {
    if (source === 'scripted') return '固定意图';
    if (source === 'pressure') return '压力续聊';
    if (source === 'greeting') return '每日问候';
    if (source === 'idle_gap') return '无交互';
    return source || '未知来源';
  }

  function showDaySection(sceneId, day, summary) {
    const body = document.getElementById(`body-${sceneId}`);
    const safeDay = String(day).replace(/[^a-zA-Z0-9_-]/g, '_');
    const id = `day-${sceneId}-${safeDay}`;
    let section = document.getElementById(id);
    if (!section) {
      section = document.createElement('div');
      section.className = 'day-section';
      section.id = id;
      section.innerHTML = `
        <div class="day-head" onclick="this.parentElement.querySelector('.day-body').classList.toggle('hidden')">
          <span class="day-title">Day ${escapeHtml(String(day))}</span>
          <span>${escapeHtml(summary || '')}</span>
        </div>
        <div class="day-body" id="${id}-body"></div>`;
      body.appendChild(section);
    }
    const summaryEl = section.querySelector('.day-head span:last-child');
    if (summaryEl && summary) summaryEl.textContent = summary;
    return document.getElementById(`${id}-body`);
  }

  function renderRecord(r) {
    if (r.action === 'idle_gap') return renderIdleGap(r);

    const isGreeting = r.action === 'greeting';
    const actionLabel = isGreeting ? '每日问候' : '对话';
    const turnLabel = formatTurnLabel(r);
    const sourceLabel = formatTurnSource(r.turn_source);
    let html = `
      <div class="ep-head">
        <div class="ep-day">Day ${r.day} · ${turnLabel} · ${actionLabel} · ${escapeHtml(sourceLabel)}</div>
        <div class="ep-kind">${isGreeting ? '打开页面' : '双 LLM 对话'}</div>
      </div>`;

    html += '<div class="ep-chat">';
    if (r.user_message) {
      html += `
        <div class="msg-row user-msg">
          <div class="msg-avatar student">生</div>
          <div class="msg-content">
            <div class="msg-label">用户 LLM</div>
            <div class="msg-bubble">${escapeHtml(r.user_message)}</div>
          </div>
        </div>`;
    } else {
      html += `
        <div class="msg-row user-msg">
          <div class="msg-avatar student">生</div>
          <div class="msg-content">
            <div class="msg-label">用户动作</div>
            <div class="msg-bubble">用户打开页面，触发当天问候。</div>
          </div>
        </div>`;
    }
    html += `
      <div class="msg-row">
        <div class="msg-avatar xiaoxin">信</div>
        <div class="msg-content">
          <div class="msg-label">小芯 LLM${r.expression ? ` · ${escapeHtml(r.expression)}` : ''}</div>
          <div class="msg-bubble">${escapeHtml(r.xiaoxin_reply)}</div>
        </div>
      </div>`;
    html += '</div>';

    const state = r.state || {};
    const hook = r.next_hook || {};
    html += '<div class="state-strip">';
    html += `<span class="chip">阶段 ${escapeHtml(state.user_stage || '?')}</span>`;
    html += `<span class="chip">主题 ${escapeHtml(state.recent_topic || '?')}</span>`;
    html += `<span class="chip ${hook.active ? 'active' : 'warn'}">hook ${escapeHtml(hook.topic || 'none')} · ${hook.active ? 'active' : 'inactive'}</span>`;
    html += `<span class="chip">表情 ${escapeHtml(r.expression || '?')}</span>`;
    html += `<span class="chip">动作 ${escapeHtml(formatCompanionAction(r.companion_action))}</span>`;
    html += '</div>';

    html += renderMemoryAuditPanel(r);

    if (shouldShowManualReview(r)) {
      html += renderManualReviewPanel(r);
    }

    (r.violations || []).forEach(v => {
      html += renderViolation(v);
    });
    if (r.day_summary) {
      html += `<div class="day-summary">${escapeHtml(r.day_summary)}</div>`;
    }

    return `<div class="episode-record">${html}</div>`;
  }

  function showSceneCard(sceneId, name) {
    let card = document.getElementById(`card-${sceneId}`);
    if (!card) {
      card = document.createElement('div');
      card.className = 'scene-card';
      card.id = `card-${sceneId}`;
      card.innerHTML = `
        <div class="scene-head" onclick="this.parentElement.querySelector('.scene-body').classList.toggle('hidden')">
          <div class="scene-head-left">
            <span class="badge running">RUNNING</span>
            <span class="scene-head-title">${escapeHtml(name)}</span>
            <span class="scene-head-desc" id="desc-${sceneId}"></span>
          </div>
        </div>
        <div class="scene-body" id="body-${sceneId}">
          <div class="replay-intro">每日 LLM 对话回放：先看用户模拟 LLM 说了什么，再看小芯 LLM 如何回应，最后看本轮状态是否迁移。</div>
        </div>`;
      document.getElementById('results').appendChild(card);
    }
    return card.querySelector('.scene-body');
  }

  function updateSceneVerdict(sceneId, verdict, notes, desc, seed) {
    const card = document.getElementById(`card-${sceneId}`);
    if (!card) return;
    const badge = card.querySelector('.badge');
    const vb = verdict === 'PASS' ? 'pass' : verdict === 'WARN' ? 'warn' : 'fail';
    badge.className = `badge ${vb}`;
    badge.textContent = verdict;
    const descEl = document.getElementById(`desc-${sceneId}`);
    if (descEl) descEl.textContent = desc ? `· ${escapeHtml(desc)}` : '';
    const body = document.getElementById(`body-${sceneId}`);
    if (body && notes) {
      const existing = body.querySelector('.scene-notes');
      if (existing) existing.remove();
      const div = document.createElement('div');
      div.className = 'scene-notes';
      div.textContent = notes + (seed != null ? `\nseed: ${seed}` : '');
      body.appendChild(div);
    }
  }

  function startRun() {
    const scene = document.getElementById('sceneSelect').value;
    const mode = document.getElementById('modeSelect').value;
    const turnsPerDay = parseInt(document.getElementById('turnsPerDaySelect').value, 10);
    const maxDaysRaw = document.getElementById('maxDaysInput').value;
    const seedRaw = document.getElementById('seedInput').value;
    const skipJudge = document.getElementById('skipJudge').checked;
    const statusEl = document.getElementById('statusLine');
    const runBtn = document.getElementById('runButton');
    const resultsEl = document.getElementById('results');

    // Build URL with query params for EventSource
    const params = new URLSearchParams();
    params.set('scene', scene);
    if (seedRaw) params.set('seed', seedRaw);
    if (skipJudge) params.set('skip_judge', '1');

    // Clear old results
    resultsEl.innerHTML = '';

    statusEl.textContent = '运行中…';
    statusEl.className = 'status-line running';
    runBtn.disabled = true;

    // Use fetch + streaming instead of EventSource (EventSource doesn't support POST)
    fetch(`${API_BASE}/api/v2/relationship-selfplay/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        scene: scene,
        mode: mode,
        turns_per_day: turnsPerDay,
        seed: seedRaw ? parseInt(seedRaw) : null,
        skip_judge: skipJudge,
        max_days: maxDaysRaw ? parseInt(maxDaysRaw) : null
      })
    }).then(response => {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let pendingEvent = '';
      let pendingData = '';

      function processSseBuffer(text, flush = false) {
        if (!text && !flush) return '';
        const lines = text.split('\n');
        let remaining = '';
        if (!flush) {
          remaining = lines.pop() || '';
        } else if (lines[lines.length - 1] !== '') {
          lines.push('');
        }

        for (const line of lines) {
          if (line.startsWith('event: ')) {
            pendingEvent = line.slice(7).trim();
          } else if (line.startsWith('data: ')) {
            pendingData += line.slice(6);
          } else if (line === '' && pendingEvent && pendingData) {
            try {
              handleEvent(pendingEvent, JSON.parse(pendingData));
            } catch (e) {
              console.error('Parse error:', e, pendingData);
            }
            pendingEvent = '';
            pendingData = '';
          }
        }

        return remaining;
      }

      function flushSseBuffer(text) {
        pendingData = pendingData.trim();
        return processSseBuffer(text, true);
      }

      function processChunk() {
        reader.read().then(({ done, value }) => {
          if (done) {
            buffer = flushSseBuffer(buffer);
            statusEl.textContent = '测试完成。';
            statusEl.className = 'status-line done';
            runBtn.disabled = false;
            return;
          }

          buffer += decoder.decode(value, { stream: true });
          buffer = processSseBuffer(buffer);
          processChunk();
        });
      }
      processChunk();
    }).catch(err => {
      statusEl.textContent = `连接失败: ${err.message}`;
      statusEl.className = 'status-line error';
      runBtn.disabled = false;
    });
  }

  let currentSceneId = null;

  function handleEvent(eventType, data) {
    if (eventType === 'episode') {
      currentSceneId = data.scene_id || currentSceneId || 'unknown';
      showSceneCard(currentSceneId, data.scene_name || '进行中…');
      const dayBody = showDaySection(currentSceneId, data.day, data.day_summary || '');
      dayBody.innerHTML += renderRecord(data);
      dayBody.scrollIntoView({ behavior: 'smooth', block: 'end' });
    } else if (eventType === 'quality_judge') {
      const body = showSceneCard(currentSceneId || 'unknown', '进行中…');
      body.innerHTML += renderQualityPanel(data);
    } else if (eventType === 'complete') {
      currentSceneId = data.scene_id;
      // Pre-create the card if it doesn't exist
      const body = showSceneCard(data.scene_id, data.name);
      // Add judge panel if not already shown
      if (data.quality_judge && data.quality_judge.scores) {
        const qp = body.querySelector('.quality-panel');
        if (!qp) body.innerHTML += renderQualityPanel(data.quality_judge);
      }
      // Add records if not already shown (for rendering without streaming)
      if (data.records && body.querySelectorAll('.episode-record').length === 0) {
        data.records.forEach(r => {
          const dayBody = showDaySection(data.scene_id, r.day, r.day_summary || '');
          dayBody.innerHTML += renderRecord(r);
        });
      }
      updateSceneVerdict(data.scene_id, data.verdict, data.notes, data.description, data.seed);
    } else if (eventType === 'error') {
      const statusEl = document.getElementById('statusLine');
      statusEl.textContent = `错误: ${data.message}`;
      statusEl.className = 'status-line error';
      document.getElementById('runButton').disabled = false;
    }
  }

  function clearResults() {
    document.getElementById('results').innerHTML = '<div class="empty-hint">选择场景后开始运行，页面会按天展示用户 LLM 和小芯 LLM 的完整对话。</div>';
    document.getElementById('statusLine').textContent = '选择场景后点击开始。';
    document.getElementById('statusLine').className = 'status-line';
    currentSceneId = null;
  }

  loadScenes();
</script>
</body>
</html>

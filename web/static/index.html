<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小信 · 信电学院数字学长</title>
<style>
:root {
  --blue-900: #0d1b2a; --blue-800: #14273d; --blue-700: #1b3a5c; --blue-600: #234d7a;
  --blue-500: #2b5f99; --blue-400: #4a8fd4; --blue-100: #d6e8fa;
  --amber: #f0a500; --amber-dim: #c48800; --amber-glow: #ffc940;
  --cream: #faf7f2; --warm-bg: #f5f0e8; --card: #ffffff;
  --text: #1a1a1a; --text-dim: #6b6b6b; --text-light: #999;
  --shadow-sm: 0 1px 3px rgba(13,27,42,0.06);
  --shadow-md: 0 4px 16px rgba(13,27,42,0.10);
  --shadow-lg: 0 8px 32px rgba(13,27,42,0.14);
  --radius-sm: 8px; --radius-md: 16px; --radius-lg: 24px;
  --font-display: 'Georgia', 'Noto Serif SC', serif;
  --font-body: 'system-ui', '-apple-system', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
  --sidebar-w: 280px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--warm-bg);
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(240,165,0,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(43,95,153,0.05) 0%, transparent 50%);
  min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px;
}

/* ── 主布局：侧边栏 + 聊天 ──────────────────────────────────────── */
.app-layout { display: flex; width: 100%; max-width: 780px; height: 90vh; max-height: 800px; gap: 0; }
.sidebar { width: var(--sidebar-w); background: #fff; border-radius: var(--radius-lg) 0 0 var(--radius-lg);
  border: 1px solid rgba(27,58,92,0.08); border-right: none; display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid rgba(27,58,92,0.06); display: flex;
  align-items: center; justify-content: space-between; }
.sidebar-header h3 { font-size: 14px; color: var(--text); font-family: var(--font-display); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-thumb { background: rgba(27,58,92,0.10); border-radius: 20px; }
.session-item { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
  transition: background 0.15s; margin-bottom: 2px; position: relative; display: flex;
  justify-content: space-between; align-items: flex-start; }
.session-item:hover { background: rgba(74,143,212,0.06); }
.session-item.active { background: rgba(74,143,212,0.12); }
.session-item .si-title { font-size: 13px; color: var(--text); line-height: 1.4; font-weight: 500; flex: 1; }
.session-item .si-meta { font-size: 10px; color: var(--text-light); margin-top: 3px; }
.session-item .si-delete { opacity: 0; background: none; border: none; color: #c44; cursor: pointer;
  font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
.session-item:hover .si-delete { opacity: 0.6; }
.session-item .si-delete:hover { opacity: 1; background: rgba(200,60,60,0.1); }
.sidebar-empty { text-align: center; color: var(--text-light); font-size: 12px; padding: 32px 16px; line-height: 1.8; }

/* ── 聊天容器 ──────────────────────────────────────────────────── */
.chat-container {
  flex: 1; background: var(--card); border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  box-shadow: var(--shadow-lg); display: flex; flex-direction: column; overflow: hidden;
  border: 1px solid rgba(27,58,92,0.08); border-left: 1px solid rgba(27,58,92,0.06); min-width: 0;
}

.chat-header {
  background: linear-gradient(135deg, var(--blue-800) 0%, var(--blue-600) 100%);
  padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden;
}
.chat-header::after { content:''; position:absolute; top:-30px; right:-40px; width:120px; height:120px;
  border-radius:50%; background:rgba(240,165,0,0.12); pointer-events:none; }
.avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,var(--amber),var(--amber-dim));
  display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0;
  box-shadow:0 2px 8px rgba(240,165,0,0.25); position:relative; z-index:1; }
.header-info { position:relative; z-index:1; }
.header-info h1 { color:#fff; font-size:18px; font-weight:600; font-family:var(--font-display); letter-spacing:0.02em; }
.header-info .status { color:rgba(255,255,255,0.75); font-size:12px; display:flex; align-items:center; gap:5px; }
.status-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; display:inline-block; animation:pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(1.3);} }
.header-actions { margin-left:auto; position:relative; z-index:1; display:flex; gap:8px; }
.btn-hdr { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.8);
  padding:6px 14px; border-radius:20px; font-size:12px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.btn-hdr:hover { background:rgba(255,255,255,0.22); color:#fff; }
.btn-hdr.history-toggle { display: none; }

/* ── 消息区域 ──────────────────────────────────────────────────── */
.chat-messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:16px;
  background:linear-gradient(180deg,rgba(214,232,250,0.15) 0%,transparent 30%); scroll-behavior:smooth; }
.chat-messages::-webkit-scrollbar { width:5px; }
.chat-messages::-webkit-scrollbar-track { background:transparent; }
.chat-messages::-webkit-scrollbar-thumb { background:rgba(27,58,92,0.12); border-radius:20px; }

.message { display:flex; gap:10px; animation:msg-in 0.35s cubic-bezier(0.16,1,0.3,1); max-width:92%; }
@keyframes msg-in { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
.message.user { align-self:flex-end; flex-direction:row-reverse; }
.message.bot  { align-self:flex-start; }
.msg-avatar { width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center;
  justify-content:center; font-size:16px; }
.message.bot .msg-avatar { background:linear-gradient(135deg,var(--amber),var(--amber-dim));
  box-shadow:0 1px 4px rgba(240,165,0,0.2); }
.message.user .msg-avatar { background:var(--blue-500); color:#fff; font-size:15px; font-weight:600; }
.msg-bubble { padding:12px 16px; border-radius:var(--radius-md); font-size:15px; line-height:1.55; position:relative; }
.message.bot .msg-bubble { background:#f0f4f9; color:var(--text); border-bottom-left-radius:4px; }
.message.user .msg-bubble { background:linear-gradient(135deg,var(--blue-600) 0%,var(--blue-500) 100%);
  color:#fff; border-bottom-right-radius:4px; }

.typing-indicator { display:flex; gap:4px; padding:4px 0; }
.typing-indicator span { width:7px; height:7px; border-radius:50%; background:var(--blue-400);
  animation:bounce 1.2s infinite; }
.typing-indicator span:nth-child(2){animation-delay:0.15s;} .typing-indicator span:nth-child(3){animation-delay:0.3s;}
@keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-8px);} }

.welcome-hint { text-align:center; color:var(--text-dim); font-size:13px; padding:32px 20px 8px; line-height:1.6; }

/* ── 输入区 ────────────────────────────────────────────────────── */
.chat-input-area { padding:12px 16px; border-top:1px solid rgba(27,58,92,0.06); display:flex; gap:10px;
  background:var(--card); }
.chat-input-area input { flex:1; padding:12px 18px; border:1.5px solid rgba(27,58,92,0.12);
  border-radius:28px; font-size:15px; font-family:var(--font-body); outline:none;
  transition:border-color 0.2s,box-shadow 0.2s; background:#f9f9f9; }
.chat-input-area input:focus { border-color:var(--blue-400); box-shadow:0 0 0 3px rgba(74,143,212,0.10); background:#fff; }
.chat-input-area input::placeholder { color:var(--text-light); }
.btn-send { width:44px; height:44px; border-radius:50%; border:none;
  background:linear-gradient(135deg,var(--blue-600) 0%,var(--blue-500) 100%); color:#fff; font-size:18px;
  cursor:pointer; flex-shrink:0; transition:transform 0.15s,box-shadow 0.15s; display:flex;
  align-items:center; justify-content:center; }
.btn-send:hover { transform:scale(1.06); box-shadow:0 4px 14px rgba(43,95,153,0.3); }
.btn-send:active { transform:scale(0.95); }
.btn-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

.footer-info { text-align:center; padding:6px 16px 10px; font-size:10px; color:var(--text-light); letter-spacing:0.03em; }
.footer-info span { font-family:var(--font-mono); font-size:9px; }

/* ── 响应式 ────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .sidebar { display: none; position: fixed; left:0; top:0; bottom:0; z-index:100;
    border-radius: 0; box-shadow: var(--shadow-lg); width: 260px; }
  .sidebar.open { display: flex; }
  .chat-container { border-radius: var(--radius-lg); }
  .btn-hdr.history-toggle { display: inline-block; }
  .sidebar-overlay { display: none; position: fixed; inset:0; background:rgba(0,0,0,0.3); z-index:99; }
  .sidebar-overlay.open { display: block; }
  body { padding: 0; }
  .chat-container { height: 100vh; max-height: 100vh; border-radius: 0; }
}
</style>
</head>
<body>

<div class="app-layout">
  <!-- 移动端遮罩 -->
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- 历史侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>💬 历史对话</h3>
      <button class="btn-hdr" style="color:var(--text);background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.08);"
              onclick="refreshSessions()" title="刷新">↻</button>
    </div>
    <div class="sidebar-list" id="sessionList">
      <div class="sidebar-empty">还没有对话记录<br>开始聊天后会自动保存</div>
    </div>
  </div>

  <!-- 聊天主区 -->
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🦉</div>
      <div class="header-info">
        <h1>小信</h1>
        <div class="status"><span class="status-dot"></span>信电学院 · 在线</div>
      </div>
      <div class="header-actions">
        <button class="btn-hdr history-toggle" onclick="openSidebar()">☰ 历史</button>
        <button class="btn-hdr" onclick="resetChat()">↺ 新对话</button>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="welcome-hint">
        👋 你好！我是小信，信电学院的数字学长。<br>有什么想聊的，随时问我～
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off"
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <div class="footer-info">
      小信 v3.0 · <span id="modelName">deepseek-v4-flash</span> · 信电学院数字学长
    </div>
  </div>
</div>

<script>
const USER_ID = 'user_' + (localStorage.getItem('xiaoxin_uid') || (()=>{
  const uid = Date.now().toString(36); localStorage.setItem('xiaoxin_uid', uid); return uid; })());
let currentSessionId = null;
let isWaiting = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const sessionList = document.getElementById('sessionList');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

const EXPRESSION_EMOJI = {
  smile:'😊',cheer:'💪',think:'🤔',proud:'😎',wink:'😉',wave:'👋',surprise:'😮',love:'🥰',sweat:'😅',sad:'😢'
};

// ── 侧边栏 ────────────────────────────────────────────────────────
function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

async function refreshSessions() {
  try {
    const resp = await fetch(`/api/sessions?user_id=${USER_ID}`);
    const sessions = await resp.json();
    if (!sessions.length) {
      sessionList.innerHTML = '<div class="sidebar-empty">还没有对话记录<br>开始聊天后会自动保存</div>';
      return;
    }
    sessionList.innerHTML = sessions.map(s => `
      <div class="session-item${s.session_id === currentSessionId ? ' active' : ''}"
           onclick="loadSession('${s.session_id}')">
        <div>
          <div class="si-title">${escapeHtml(s.title)}</div>
          <div class="si-meta">${s.created_at} · ${s.message_count}条消息</div>
        </div>
        <button class="si-delete" onclick="event.stopPropagation();deleteSession('${s.session_id}')" title="删除">×</button>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

async function loadSession(sid) {
  try {
    const resp = await fetch(`/api/sessions/${sid}?user_id=${USER_ID}`);
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }

    currentSessionId = data.session_id;
    messagesEl.innerHTML = '';
    data.messages.forEach(m => {
      const role = m.role === 'assistant' ? 'bot' : 'user';
      addMessage(role, m.content, role === 'bot' ? 'smile' : null);
    });
    if (!data.messages.length) {
      messagesEl.innerHTML = '<div class="welcome-hint">👋 这似乎是一段空对话。</div>';
    }
    closeSidebar();
    refreshSessions();
  } catch(e) { console.error(e); }
}

async function deleteSession(sid) {
  if (!confirm('确定删除这条对话记录吗？')) return;
  try {
    await fetch(`/api/sessions/${sid}?user_id=${USER_ID}`, { method: 'DELETE' });
    if (currentSessionId === sid) {
      currentSessionId = null;
      messagesEl.innerHTML = '<div class="welcome-hint">👋 你好！我是小信，信电学院的数字学长。<br>有什么想聊的，随时问我～</div>';
    }
    refreshSessions();
  } catch(e) { console.error(e); }
}

// ── 消息渲染 ──────────────────────────────────────────────────────
function addMessage(role, text, expression) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const ava = role === 'bot' ? (EXPRESSION_EMOJI[expression] || '🦉') : '我';
  div.innerHTML = `<div class="msg-avatar">${ava}</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
  const w = messagesEl.querySelector('.welcome-hint');
  if (w) w.remove();
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div'); div.className = 'message bot'; div.id = 'typing-msg';
  div.innerHTML = '<div class="msg-avatar">🦉</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  messagesEl.appendChild(div); messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { const e=document.getElementById('typing-msg'); if(e)e.remove(); }

// ── 发送消息 ──────────────────────────────────────────────────────
async function sendMessage() {
  if (isWaiting) return;
  const text = inputEl.value.trim();
  if (!text) return;
  isWaiting = true; sendBtn.disabled = true; inputEl.value = '';
  addMessage('user', text);
  showTyping();
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: USER_ID, message: text }),
    });
    const data = await resp.json();
    removeTyping();
    if (data.error) { addMessage('bot', '哎呀，出了点问题：'+data.error, 'sweat'); }
    else {
      addMessage('bot', data.reply, data.expression);
      document.getElementById('modelName').textContent = data.model || 'deepseek-v4-flash';
      if (data.session_id) currentSessionId = data.session_id;
      refreshSessions();
    }
  } catch(err) {
    removeTyping();
    addMessage('bot', '网络好像不太稳定，稍等再试试？', 'sweat');
  }
  isWaiting = false; sendBtn.disabled = false; inputEl.focus();
}

// ── 重置 ─────────────────────────────────────────────────────────
async function resetChat() {
  try {
    await fetch('/api/reset', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: USER_ID }) });
    currentSessionId = null;
    messagesEl.innerHTML = '<div class="welcome-hint">👋 对话已新建！我是小信，信电学院的数字学长。<br>有什么想聊的，随时问我～</div>';
    refreshSessions();
  } catch(e) { console.error(e); }
}

function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

// ── 初始化 ───────────────────────────────────────────────────────
refreshSessions();
inputEl.focus();
</script>
</body>
</html>

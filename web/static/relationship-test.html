<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小信 · 关系闭环测试</title>
<style>
:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --surface-soft: #f0f5f2;
  --ink: #17202a;
  --muted: #64707d;
  --line: #d8dee6;
  --green: #16815d;
  --green-soft: #e8f6ef;
  --red: #c8333a;
  --red-soft: #fff0f1;
  --gold: #a66d09;
  --gold-soft: #fff6df;
  --teal: #217783;
  --shadow: 0 10px 28px rgba(23, 32, 42, 0.08);
  --radius: 8px;
  --font: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background: var(--bg);
  font-family: var(--font);
}
button, select, input { font: inherit; }
.shell {
  width: min(1180px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 20px 0 36px;
}
.top {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: end;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
h1 {
  margin: 0 0 4px;
  font-size: 24px;
  font-weight: 760;
  letter-spacing: 0;
}
.subtitle {
  color: var(--muted);
  font-size: 13px;
}
.nav-link {
  color: var(--teal);
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
}
.toolbar {
  margin: 16px 0;
  display: grid;
  grid-template-columns: minmax(220px, 1.4fr) minmax(150px, 0.8fr) minmax(130px, 0.6fr) auto auto;
  gap: 10px;
  align-items: end;
}
.field label {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
select {
  width: 100%;
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--ink);
  padding: 0 10px;
}
.mode-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.mode-wrap input { position: absolute; opacity: 0; pointer-events: none; }
.mode-wrap label {
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  cursor: pointer;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}
.mode-wrap input:checked + label {
  background: var(--green-soft);
  color: var(--green);
}
.btn {
  min-height: 38px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  padding: 0 16px;
  cursor: pointer;
  font-weight: 760;
  white-space: nowrap;
}
.btn-primary { background: var(--green); color: white; }
.btn-secondary { background: var(--surface); border-color: var(--line); color: var(--muted); }
.btn:disabled { opacity: 0.55; cursor: wait; }
.status {
  min-height: 32px;
  display: flex;
  align-items: center;
  color: var(--muted);
  font-size: 13px;
}
.status.error {
  color: var(--red);
  background: var(--red-soft);
  border: 1px solid rgba(200, 51, 58, 0.2);
  border-radius: var(--radius);
  padding: 8px 10px;
}
.summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin: 14px 0 16px;
}
.metric {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
}
.metric .label { color: var(--muted); font-size: 12px; font-weight: 700; }
.metric .value { margin-top: 4px; font-size: 22px; font-weight: 780; }
.results {
  display: grid;
  gap: 12px;
}
.empty {
  background: var(--surface);
  border: 1px dashed var(--line);
  border-radius: var(--radius);
  color: var(--muted);
  padding: 36px 18px;
  text-align: center;
}
.persona-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.persona-head {
  width: 100%;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  border: 0;
  background: var(--surface);
  color: inherit;
  text-align: left;
  padding: 14px 16px;
  cursor: pointer;
}
.badge {
  border-radius: 999px;
  padding: 4px 9px;
  font-size: 12px;
  font-weight: 800;
}
.badge.pass { background: var(--green-soft); color: var(--green); }
.badge.fail { background: var(--red-soft); color: var(--red); }
.persona-title { font-weight: 780; }
.persona-desc { margin-top: 3px; color: var(--muted); font-size: 13px; }
.score { color: var(--teal); font-weight: 800; }
.persona-body {
  display: none;
  border-top: 1px solid var(--line);
  padding: 14px 16px 16px;
}
.persona-card.open .persona-body { display: block; }
.dims {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.dim {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 9px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.dim.pass { border-color: rgba(22, 129, 93, 0.22); color: var(--green); background: var(--green-soft); }
.dim.fail { border-color: rgba(200, 51, 58, 0.22); color: var(--red); background: var(--red-soft); }
.timeline {
  display: grid;
  gap: 10px;
}
.record {
  display: grid;
  grid-template-columns: 92px 1fr;
  gap: 14px;
  padding: 12px;
  border: 1px solid var(--line);
  border-left: 4px solid var(--teal);
  border-radius: var(--radius);
  background: #fbfcfd;
}
.record.has-violations { border-left-color: var(--red); background: var(--red-soft); }
.record-time {
  color: var(--muted);
  font-size: 12px;
  font-weight: 760;
}
.record-time strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
  font-size: 15px;
}
.lines {
  display: grid;
  gap: 8px;
}
.line {
  display: grid;
  grid-template-columns: 82px 1fr;
  gap: 8px;
  min-width: 0;
  font-size: 13px;
  line-height: 1.55;
}
.line span:first-child {
  color: var(--muted);
  font-weight: 760;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  border-radius: 999px;
  background: var(--surface-soft);
  color: #244239;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: 700;
}
.chip.warn { background: var(--gold-soft); color: var(--gold); }
.violations {
  display: grid;
  gap: 6px;
}
.violation {
  border: 1px solid rgba(200, 51, 58, 0.18);
  border-radius: var(--radius);
  background: white;
  color: var(--red);
  padding: 8px 10px;
}
.violation strong { display: block; margin-bottom: 3px; }
.violation div { color: #7c2730; }
@media (max-width: 780px) {
  .top, .toolbar, .summary { grid-template-columns: 1fr; }
  .record, .line { grid-template-columns: 1fr; }
  .persona-head { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="shell">
  <section class="top">
    <div>
      <h1>关系闭环测试</h1>
      <div class="subtitle">跨天 persona 时间线、relationship_state、next_hook 和违规项审查</div>
    </div>
    <a class="nav-link" href="/test">对话压测</a>
  </section>

  <section class="toolbar">
    <div class="field">
      <label for="personaSelect">Persona</label>
      <select id="personaSelect">
        <option value="all">全部 persona</option>
      </select>
    </div>
    <div class="field">
      <label id="modeToggle">模式</label>
      <div class="mode-wrap" aria-labelledby="modeToggle">
        <input id="modeOffline" name="mode" type="radio" value="offline" checked>
        <label for="modeOffline">离线模拟</label>
        <input id="modeLive" name="mode" type="radio" value="live">
        <label for="modeLive">真实模型</label>
      </div>
    </div>
    <div class="field">
      <label for="daysSelect">Days</label>
      <select id="daysSelect">
        <option value="">全部</option>
        <option value="0">Day 0</option>
        <option value="1">Day 1</option>
        <option value="2">Day 2</option>
        <option value="3">Day 3</option>
        <option value="7">Day 7</option>
        <option value="8">Day 8</option>
      </select>
    </div>
    <button class="btn btn-primary" id="runButton" type="button" onclick="runRelationshipTest()">开始</button>
    <button class="btn btn-secondary" id="clearButton" type="button" onclick="clearReport()">清空</button>
  </section>

  <div class="status" id="statusLine">待运行</div>
  <section class="summary" id="summary"></section>
  <section class="results" id="results">
    <div class="empty">选择 persona 后开始运行。</div>
  </section>
</main>

<script>
const state = {
  personas: [],
  report: null,
};

async function fetchPersonas() {
  const response = await fetch('/api/relationship-selfplay/personas');
  const payload = await response.json();
  state.personas = payload.personas || [];
  const select = document.getElementById('personaSelect');
  select.innerHTML = '<option value="all">全部 persona</option>' + state.personas.map(persona =>
    `<option value="${escapeHtml(persona.id)}">${escapeHtml(persona.name)} · ${persona.steps} steps</option>`
  ).join('');
}

async function runRelationshipTest() {
  const button = document.getElementById('runButton');
  const status = document.getElementById('statusLine');
  const persona = document.getElementById('personaSelect').value;
  const live = document.getElementById('modeLive').checked;
  const daysValue = document.getElementById('daysSelect').value;

  button.disabled = true;
  status.className = 'status';
  status.textContent = live ? '真实模型运行中，可能需要更久。' : '离线模拟运行中。';

  try {
    const response = await fetch('/api/relationship-selfplay/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        persona,
        days: daysValue || null,
        live,
        show_app_log: false,
      }),
    });
    const payload = await response.json();
    if (!response.ok) {
      throw new Error(payload.error || `HTTP ${response.status}`);
    }
    state.report = payload;
    status.textContent = `完成 · ${formatTime(payload.generated_at)}`;
    renderReport(payload);
  } catch (error) {
    status.className = 'status error';
    status.textContent = error.message;
  } finally {
    button.disabled = false;
  }
}

function clearReport() {
  state.report = null;
  document.getElementById('statusLine').className = 'status';
  document.getElementById('statusLine').textContent = '待运行';
  document.getElementById('summary').innerHTML = '';
  document.getElementById('results').innerHTML = '<div class="empty">选择 persona 后开始运行。</div>';
}

function renderReport(report) {
  document.getElementById('summary').innerHTML = [
    metric('通过', `${report.passed} / ${report.total}`),
    metric('失败', report.failed),
    metric('模式', report.mode),
    metric('生成时间', formatTime(report.generated_at)),
  ].join('');

  const results = report.results || [];
  document.getElementById('results').innerHTML = results.map(renderPersona).join('');
  document.querySelectorAll('.persona-card').forEach((card, index) => {
    if (index === 0) card.classList.add('open');
  });
}

function metric(label, value) {
  return `<article class="metric"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(String(value))}</div></article>`;
}

function renderPersona(result) {
  const pass = !(result.violations || []).length;
  const dimensions = ['continuity', 'restraint', 'stage_migration', 'emotion_support', 'memory_restraint', 'boundary_safety'];
  const violations = result.violations || [];
  return `<article class="persona-card">
    <button class="persona-head" type="button" onclick="this.closest('.persona-card').classList.toggle('open')">
      <span class="badge ${pass ? 'pass' : 'fail'}">${pass ? 'PASS' : 'FAIL'}</span>
      <span>
        <span class="persona-title">${escapeHtml(result.name)} (${escapeHtml(result.persona)})</span>
        <span class="persona-desc">${escapeHtml(result.description || '')}</span>
      </span>
      <span class="score">score ${escapeHtml(String(result.relationship_score))}</span>
    </button>
    <div class="persona-body">
      <div class="dims">
        ${dimensions.map(key => `<span class="dim ${result[key]}">${escapeHtml(key)} · ${escapeHtml(result[key] || '-')}</span>`).join('')}
      </div>
      ${violations.length ? `<div class="violations">${violations.map(renderViolation).join('')}</div>` : ''}
      <div class="timeline">${(result.records || []).map(renderRecord).join('')}</div>
    </div>
  </article>`;
}

function renderRecord(record) {
  const stateInfo = record.state || {};
  const next_hook = record.next_hook || {};
  const companion_action = record.companion_action || {};
  const violations = record.violations || [];
  return `<article class="record ${violations.length ? 'has-violations' : ''}">
    <div class="record-time">
      <strong>Day ${escapeHtml(String(record.day))}</strong>
      ${escapeHtml(record.action)}
    </div>
    <div class="lines">
      <div class="line"><span>用户</span><div>${escapeHtml(record.user_message || '-')}</div></div>
      <div class="line"><span>小信</span><div>${escapeHtml(record.xiaoxin_reply || '-')}</div></div>
      <div class="line"><span>state</span><div class="chips">
        ${chip(stateInfo.user_stage)}
        ${chip(stateInfo.recent_mood)}
        ${chip(stateInfo.recent_topic)}
        ${chip(`level ${stateInfo.relationship_level ?? '-'}`)}
      </div></div>
      <div class="line"><span>next_hook</span><div class="chips">
        ${chip(next_hook.topic || '-')}
        ${chip(next_hook.label || '-')}
        ${chip(next_hook.active ? 'active' : 'inactive', next_hook.active ? '' : 'warn')}
      </div></div>
      <div class="line"><span>companion_action</span><div class="chips">
        ${chip(companion_action.kind || '-')}
        ${chip(companion_action.intensity ?? '-')}
      </div></div>
      <div class="line"><span>violations</span><div>
        ${violations.length ? `<div class="violations">${violations.map(renderViolation).join('')}</div>` : '无'}
      </div></div>
    </div>
  </article>`;
}

function renderViolation(violation) {
  return `<div class="violation">
    <strong>${escapeHtml(violation.type || '未知违规')}</strong>
    <div>${escapeHtml(violation.detail || '')}</div>
    ${violation.evidence ? `<div>证据：${escapeHtml(violation.evidence)}</div>` : ''}
  </div>`;
}

function chip(value, className = '') {
  return `<span class="chip ${className}">${escapeHtml(String(value ?? '-'))}</span>`;
}

function formatTime(value) {
  if (!value) return '-';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('zh-CN', {hour12: false});
}

function escapeHtml(value) {
  const div = document.createElement('div');
  div.textContent = value;
  return div.innerHTML;
}

fetchPersonas().catch(error => {
  const status = document.getElementById('statusLine');
  status.className = 'status error';
  status.textContent = error.message;
});
</script>
</body>
</html>
